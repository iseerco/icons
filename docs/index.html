<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iseer Icons - 37,007 Premium React Icons</title>
    <meta name="description" content="Browse 37,007 icons from the @iseer/icons React library. Search, preview, and copy component code.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://storage.iseer.co/assets/favicons/iseer_logo_favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <img src="https://storage.iseer.co/assets/iseer_logo.svg" alt="Iseer" class="logo-img">
                    <div class="logo-divider"></div>
                    <span class="logo-text">Icons</span>
                </div>
                <div class="header-links">
                    <a href="https://github.com/iseerco/icons" target="_blank" class="btn btn-outline">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
                        </svg>
                        GitHub
                    </a>
                    <a href="https://www.npmjs.com/package/@iseer/icons" target="_blank" class="btn btn-primary">
                        npm install
                    </a>
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3 class="sidebar-title">Style</h3>
                    <div class="filter-group" id="styleFilter">
                        <button class="filter-btn active" data-value="all">All</button>
                        <button class="filter-btn" data-value="rounded">Rounded</button>
                        <button class="filter-btn" data-value="straight">Straight</button>
                    </div>
                </div>
                <div class="sidebar-divider"></div>
                <div class="sidebar-section">
                    <h3 class="sidebar-title">Weight</h3>
                    <div class="filter-group" id="weightFilter">
                        <button class="filter-btn active" data-value="all">All</button>
                        <button class="filter-btn" data-value="regular">Regular</button>
                        <button class="filter-btn" data-value="thin">Thin</button>
                        <button class="filter-btn" data-value="bold">Bold</button>
                        <button class="filter-btn" data-value="solid">Solid</button>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main">
                <!-- Decorative Blob -->
                <div class="blob blob-1"></div>
                <div class="blob blob-2"></div>

                <!-- Search -->
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-input"
                        placeholder="Search 37,007 icons..." 
                        autocomplete="off"
                    >
                </div>

                <!-- Results Info -->
                <div class="results-info">
                    <span id="resultCount">Loading icons...</span>
                </div>

                <!-- Icons Grid -->
                <div class="icons-grid" id="iconsGrid"></div>

                <!-- Load More -->
                <div class="load-more-container" id="loadMoreContainer" style="display: none;">
                    <button class="btn btn-outline btn-lg" id="loadMoreBtn">Load More Icons</button>
                </div>
            </main>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Made with ❤️ by <a href="https://iseer.co" target="_blank">Iseer</a></p>
            <p class="footer-meta">© 2025 Iseer & Co. All rights reserved.</p>
        </footer>

        <!-- Modal (Full-Width Flaticon Style) -->
        <div class="modal" id="iconModal">
            <div class="modal-backdrop" onclick="closeModal()"></div>
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
                
                <div class="modal-body">
                    <!-- Left: Icon Preview -->
                    <div class="modal-preview-section">
                        <div class="modal-variants" id="modalVariants">
                            <!-- Variant buttons -->
                        </div>
                        <div class="modal-icon-display">
                            <img id="modalIconImg" src="" alt="">
                        </div>
                    </div>

                    <!-- Right: Details -->
                    <div class="modal-details-section">
                        <h2 id="modalIconName" class="modal-title">Icon Name</h2>
                        <div class="modal-badges">
                            <span class="badge" id="modalStyle">rounded</span>
                            <span class="badge" id="modalWeight">regular</span>
                        </div>

                        <div class="modal-code-blocks">
                            <div class="code-block-wrapper">
                                <label>React Import</label>
                                <div class="code-block">
                                    <code id="modalImport">import { Icon } from '@iseer/icons';</code>
                                    <button class="copy-btn" onclick="copyCode('modalImport')">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="9" y="9" width="13" height="13" rx="2"/>
                                            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="code-block-wrapper">
                                <label>JSX Usage</label>
                                <div class="code-block">
                                    <code id="modalUsage">&lt;Icon /&gt;</code>
                                    <button class="copy-btn" onclick="copyCode('modalUsage')">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="9" y="9" width="13" height="13" rx="2"/>
                                            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="code-block-wrapper">
                                <label>CDN URL</label>
                                <div class="code-block">
                                    <code id="modalCdn">https://edge.iseer.co/icons/...</code>
                                    <button class="copy-btn" onclick="copyCode('modalCdn')">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="9" y="9" width="13" height="13" rx="2"/>
                                            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="modal-actions">
                            <a id="modalDownload" href="#" download class="btn btn-primary">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                    <line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                Download SVG
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 6L9 17l-5-5"/>
            </svg>
            <span>Copied to clipboard!</span>
        </div>
    </div>

    <script src="icons-manifest.js"></script>
    <script src="script.js"></script>
</body>
</html>
